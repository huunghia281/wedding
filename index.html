<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Hữu Nghĩa & Thanh Thảo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <style>
        :root {
            --gold: #D4AF37;
            --cream: #FDFCF0;
            --dark: #2c2c2c;
            --white: #ffffff;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--cream);
            color: var(--dark);
            overflow-x: hidden;
        }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('images/KTIU2906.JPG'); /* CẬP NHẬT ĐƯỜNG DẪN */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--white);
            text-align: center;
            padding: 20px;
        }

        .hero h3 { font-weight: 300; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 10px; font-size: 14px; }
        .hero h1 { font-family: 'Dancing Script', cursive; font-size: 5rem; margin: 0; }
        .hero p { font-size: 1.2rem; margin-top: 20px; font-style: italic; }

        /* --- Section Styling --- */
        section { padding: 80px 20px; text-align: center; max-width: 1100px; margin: 0 auto; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--gold); margin-bottom: 10px; }
        .divider { width: 80px; height: 2px; background: var(--gold); margin: 20px auto; }

        .info-card {
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-top: 30px;
        }
        .date { font-size: 1.5rem; font-weight: 600; color: var(--gold); margin: 20px 0; }
        .btn-map {
            display: inline-block;
            padding: 15px 35px;
            background: var(--gold);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
            margin-top: 20px;
        }

        /* --- Gallery Grids --- */
        .grid { display: grid; gap: 15px; margin-top: 40px; }
        .gate-grid { grid-template-columns: repeat(2, 1fr); }
        .table-grid { grid-template-columns: repeat(3, 1fr); }
        .album-grid { column-count: 6; column-gap: 10px; }
        
        .img-wrap { 
            margin-bottom: 10px; 
            break-inside: avoid; 
            overflow: hidden; 
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background: #eee;
        }
        .img-wrap img { width: 100%; display: block; transition: 0.6s; }
        .img-wrap:hover img { transform: scale(1.08); }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3.5rem; }
            .gate-grid { grid-template-columns: 1fr; }
            .table-grid { grid-template-columns: repeat(2, 1fr); }
            .album-grid { column-count: 2; }
        }

        footer { padding: 60px 20px; background: #f4f1ea; color: #777; font-size: 14px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="hero">
        <div data-aos="fade-down" data-aos-duration="1500">
            <h3>The Wedding of</h3>
            <h1>Hữu Nghĩa & Thanh Thảo</h1>
            <div class="divider" style="background: white;"></div>
            <p>Sự hiện diện của bạn là món quà ý nghĩa nhất</p>
        </div>
    </div>

    <section id="invitation">
        <div data-aos="fade-up">
            <h2 class="section-title">Lời Ngỏ</h2>
            <div class="info-card">
                <div class="date">THỨ BẢY, 10 THÁNG 10 NĂM 2026</div>
                <p><strong>Tại Nhà Hàng:</strong> [Tên Nhà Hàng]</p>
                <p><strong>Địa chỉ:</strong> [Địa chỉ của Nghĩa & Thảo]</p>
                <a href="#" target="_blank" class="btn-map">📍 XEM BẢN ĐỒ ĐƯỜNG ĐI</a>
            </div>
        </div>
    </section>

    <section style="background: #fff;">
        <h2 class="section-title">Welcome Photos</h2>
        <div class="divider"></div>
        <div class="grid gate-grid">
            <div class="img-wrap" data-aos="fade-right"><img src="images/KTIU2509.JPG"></div>
            <div class="img-wrap" data-aos="fade-left"><img src="images/KTIU3993.JPG"></div>
        </div>
    </section>

    <section>
        <h2 class="section-title">Gallery Table</h2>
        <div class="divider"></div>
        <div class="grid table-grid">
            <div class="img-wrap" data-aos="zoom-in"><img src="images/KTIU4231.JPG"></div>
            <div class="img-wrap" data-aos="zoom-in" data-aos-delay="100"><img src="images/KTIU3120.JPG"></div>
            <div class="img-wrap" data-aos="zoom-in" data-aos-delay="200"><img src="images/KTIU3852.JPG"></div>
            <div class="img-wrap" data-aos="zoom-in"><img src="images/KTIU3805.JPG"></div>
            <div class="img-wrap" data-aos="zoom-in" data-aos-delay="100"><img src="images/KTIU2804.JPG"></div>
            <div class="img-wrap" data-aos="zoom-in" data-aos-delay="200"><img src="images/KTIU3359.JPG"></div>
        </div>
    </section>

    <section style="background: #fff; max-width: 100%;">
        <h2 class="section-title">Our Wedding Album</h2>
        <div class="divider"></div>
        <div class="album-grid">
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3600.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3119.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3241.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3192.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3041.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU2993.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU2804.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU2691.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU4231.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU4088.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU4082.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3993.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3852.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3839.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3822.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3698.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3657.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3418.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3359.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3348.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3273.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3200.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU3113.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU2691.JPG"></div>
            <div class="img-wrap" data-aos="fade-up"><img src="images/KTIU2836.JPG"></div>
        </div>
    </section>

    <footer>
        <div data-aos="zoom-in">
            <h2 style="font-family: 'Dancing Script'; color: var(--gold); font-size: 2.5rem; margin:0;">Thank You</h2>
            HỮU NGHĨA & THANH THẢO
        </div>
    </footer>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true, offset: 120 });
    </script>
</body>
</html>
