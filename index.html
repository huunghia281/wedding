        body {

            margin: 0;
            padding: 10px; /* Thu nhỏ padding để ảnh chiếm nhiều diện tích hơn */
            overflow-x: hidden;
        }
        .gallery-container {
            column-count: 6; /* TĂNG LÊN 6 ẢNH HÀNG NGANG */
            column-gap: 8px; /* Khoảng cách giữa các cột ảnh */
            width: 100%;
            margin: 0 auto;
        }
        .img-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 8px; /* Khoảng cách giữa các hàng ảnh */
            border-radius: 4px; /* Bo góc nhẹ cho hiện đại */
            overflow: hidden;
            border: 0.5px solid #222; /* Viền siêu mỏng để tách ảnh nhẹ */
        }
        img {
            width: 100%;
            display: block;
            height: auto;
        }
        /* Hiệu ứng cuộn mượt bằng phím mũi tên hoặc nút cuộn giữa */
        html {
            scroll-behavior: smooth;
        }
    </style>
